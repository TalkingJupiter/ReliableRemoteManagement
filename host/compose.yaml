services:
  provisioning: 
    build: .
    container_name: provisioning_service
    command: python -m app.provisioning_service
    environment:
      BROKER_HOST: mosquitto
      BROKER_PORT: "1883"
    restart: unless-stopped
    networks: [mqtt_net]

  ingestion:
    build: .
    container_name: ingestion_service
    command: python -m app.ingestion_service
    environment:
      BROKER_HOST: mosquitto
      BROKER_PORT: "1883"
    restart: unless-stopped
    networks: [mqtt_net]


networks:
  mqtt_net:
    external: true
    name: repacss_mqtt